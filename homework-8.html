<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style/style.css" />
    <title>Product shop</title>
  </head>
  <body style="font-family: 'Montserrat'">
    <div class="page">
      <h1 class="page-title">Выбери свой продукт</h1>

      <div class="color-change-buttons">
        <button id="recolor-first-color-button">
          Change the color of the first card
        </button>
        <button class="recolor-backround-button">
          Change the background color
        </button>
        <button class="recolor-all-card-button">
          Change the color of all cards
        </button>
        <button id="open-google-button">Go to Google</button>
        <button class="recolor-button-color">Change this button color</button>
      </div>

      <div class="product-card-wrapper" id="product-list"></div>
      <template id="product-template">
        <div class="product-card">
          <img
            class="product-card__img product-image"
            width="290"
            height="245"
          />
          <p class="product-card__for-normal-skin product-type"></p>
          <h3 class="product-card__title product-title"></h3>
          <p class="product-card__description product-description"></p>
          <span class="product-card__cream-composition">Composition:</span>
          <ul class="product-card__composition product-composition"></ul>
          <div class="product-card__price-wrapper">
            <span class="product-card__price-text">Price</span>
            <span class="product-card__price product-price"></span>
          </div>
        </div>
      </template>
    </div>
    <script type="module" src="js/homework-8.js"></script>
    <script src="js/cards-color.js"></script>
  </body>
</html>
